<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- viewport 保证移动端正确缩放，禁止用户缩放便于专注听写 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英语听写辅助工具</title>
  <!-- Tailwind CSS CDN：无需本地安装，引入即可使用工具类实现美观 UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 移动端：去掉按钮/链接点击时的高亮块，避免误触缩放 */
    button, a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    /* “正在聆听”指示器的脉冲动画，提示用户可以说 ok */
    @keyframes pulse-mic {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    .listening-pulse { animation: pulse-mic 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-200 text-slate-800 font-sans antialiased">
  <div id="app" class="max-w-lg mx-auto px-4 py-6 pb-12">

    <!-- ========== 第一步：单词导入区（首页） ========== -->
    <section id="section-import" class="space-y-4">
      <h1 class="text-xl font-bold text-center text-slate-700 mb-6">英语听写辅助工具</h1>
      <p class="text-sm text-slate-600 text-center">在下方输入或粘贴单词，用换行、空格或逗号分隔</p>
      <!-- 支持换行、空格、逗号分隔，由 JS 统一解析并去重 -->
      <textarea
        id="input-words"
        class="w-full h-40 p-4 rounded-xl border-2 border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none resize-none text-base"
        placeholder="例如：apple&#10;banana&#10;hello world"
      ></textarea>
      <!-- 点击后解析单词、请求音频/麦克风权限并进入听写模式 -->
      <button
        id="btn-start"
        class="w-full py-4 rounded-xl bg-blue-600 text-white text-lg font-semibold shadow-lg active:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
        开始听写
      </button>
    </section>

    <!-- ========== 第二步：听写进行中 ========== -->
    <section id="section-dictation" class="hidden space-y-6">
      <!-- 进度提示器：仅显示“当前数/总数”，不显示任何单词内容；点击下一题或识别到 OK 时由 JS 更新 -->
      <div class="text-center py-3 px-4 rounded-xl bg-slate-100 border border-slate-200">
        <p class="text-sm text-slate-500 mb-0.5">听写进度</p>
        <p class="text-xl font-bold text-slate-700 tabular-nums">
          <span id="current-index">1</span> / <span id="total-count">0</span>
        </p>
      </div>
      <!-- 听写中不显示单词，仅显示占位符，避免泄题；单词仅通过语音朗读 -->
      <div class="bg-white rounded-2xl shadow-lg p-6 text-center min-h-[120px] flex flex-col justify-center">
        <p id="current-word" class="text-2xl font-bold text-slate-500 break-words">请听题</p>
        <p id="hint-replay" class="text-sm text-slate-500 mt-2">朗读两遍后，说 "ok" 进入下一个，或点击下方按钮</p>
      </div>
      <!-- 语音识别开启时显示，带脉冲动画的“正在聆听”提示 -->
      <div id="listening-indicator" class="hidden text-center py-2 rounded-xl bg-amber-100 text-amber-800 listening-pulse">
        <span class="font-medium">正在聆听 🎤</span> 说 "ok" 或 "okay" 进入下一个
      </div>
      <div class="grid grid-cols-1 gap-3">
        <button id="btn-replay" class="w-full py-4 rounded-xl bg-slate-100 text-slate-700 text-base font-medium border-2 border-slate-300 active:bg-slate-200">
          重听一遍
        </button>
        <!-- 防卡死：语音识别不可用时务必用此按钮进入下一个 -->
        <button id="btn-next" class="w-full py-4 rounded-xl bg-green-600 text-white text-lg font-semibold shadow-lg active:bg-green-700">
          下一个
        </button>
      </div>
    </section>

    <!-- ========== 第三步：听写完成 — 核对清单 ========== -->
    <section id="section-complete" class="hidden space-y-6">
      <h2 class="text-xl font-bold text-center text-slate-700">听写完成 — 核对清单</h2>
      <p class="text-sm text-slate-600 text-center">请对照下方完整单词列表，检查纸质听写本上的内容</p>
      <ul id="word-list" class="bg-white rounded-2xl shadow-lg p-4 space-y-2 max-h-[60vh] overflow-y-auto text-base">
        <!-- 完整单词列表由 JS 在听写结束时动态填充，便于纸质听写本核对 -->
      </ul>
      <button
        id="btn-restart"
        class="w-full py-4 rounded-xl bg-blue-600 text-white text-lg font-semibold shadow-lg active:bg-blue-700"
      >
        返回首页 / 重新开始
      </button>
    </section>

  </div>

  <script>
    (function () {
      'use strict';

      // ====================  DOM 引用（便于后续操作界面元素） ====================
      var sectionImport = document.getElementById('section-import');
      var sectionDictation = document.getElementById('section-dictation');
      var sectionComplete = document.getElementById('section-complete');
      var inputWords = document.getElementById('input-words');
      var btnStart = document.getElementById('btn-start');
      var btnReplay = document.getElementById('btn-replay');
      var btnNext = document.getElementById('btn-next');
      var btnRestart = document.getElementById('btn-restart');
      var currentWordEl = document.getElementById('current-word');
      var currentIndexEl = document.getElementById('current-index');
      var totalCountEl = document.getElementById('total-count');
      var wordListEl = document.getElementById('word-list');
      var listeningIndicator = document.getElementById('listening-indicator');

      // ====================  听写状态（全局变量，在三个步骤间共享） ====================
      var wordList = [];        // 去重后的单词数组
      var currentIndex = 0;     // 当前读到第几个（从 0 开始）
      var synth = window.speechSynthesis;  // 浏览器 TTS 接口，用于朗读单词
      var recognition = null;   // 语音识别实例（Chrome 等为 webkitSpeechRecognition）
      var isSpeaking = false;   // 是否正在朗读，避免朗读期间重复触发或误识别

      /**
       * 从文本框解析单词：支持换行、空格、逗号（中英文）分隔，去重、去空
       * @param {string} text - 用户输入的原始文本
       * @returns {string[]} 单词/词组数组
       */
      function parseWords(text) {
        if (!text || typeof text !== 'string') return [];
        var raw = text
          .replace(/\r\n/g, '\n')
          .replace(/\r/g, '\n')
          .split(/[\n\s,，、]+/);
        var seen = {};
        return raw.filter(function (w) {
          var trimmed = w.trim();
          if (!trimmed || seen[trimmed]) return false;
          seen[trimmed] = true;
          return true;
        });
      }

      /**
       * 用 Web Speech API 的 TTS 朗读当前单词两遍（en-US），两遍之间停顿 2.5 秒
       * 第二遍结束后自动开启语音识别，等待用户说 "ok" 进入下一个
       */
      function speakCurrentWordTwice() {
        if (!wordList.length || currentIndex >= wordList.length) return;
        var word = wordList[currentIndex];
        if (!word) return;

        isSpeaking = true;
        // 【修改】听写中不显示单词，仅显示占位符，单词只通过 TTS 朗读
        currentWordEl.textContent = '请听题';

        var utterance1 = new SpeechSynthesisUtterance(word);
        utterance1.lang = 'en-US';
        utterance1.rate = 0.9;
        utterance1.onend = function () {
          setTimeout(function () {
            var utterance2 = new SpeechSynthesisUtterance(word);
            utterance2.lang = 'en-US';
            utterance2.rate = 0.9;
            utterance2.onend = function () {
              isSpeaking = false;
              startListening(); // 两遍读完后开始监听 "ok"
            };
            synth.speak(utterance2);
          }, 2500); // 两遍之间停顿 2.5 秒
        };
        synth.speak(utterance1);
      }

      /**
       * 启动语音识别（麦克风），界面显示“正在聆听”；识别到 "ok" 或 "okay" 时进入下一个
       */
      function startListening() {
        if (!recognition) return;
        try {
          recognition.abort();
        } catch (e) {}
        listeningIndicator.classList.remove('hidden');
        recognition.start();
      }

      /** 停止语音识别并隐藏“正在聆听”提示 */
      function stopListening() {
        if (!recognition) return;
        try {
          recognition.abort();
        } catch (e) {}
        listeningIndicator.classList.add('hidden');
      }

      /**
       * 进入下一个单词：停止识别、取消 TTS，索引 +1，更新进度显示；
       * 若已是最后一个，则隐藏听写区、显示完成区并渲染完整单词列表；
       * 否则更新“听写进度”数字并自动触发朗读新单词两遍。
       */
      function goNext() {
        stopListening();
        synth.cancel();
        isSpeaking = false;

        currentIndex++;
        if (currentIndex >= wordList.length) {
          sectionDictation.classList.add('hidden');
          renderWordList();
          sectionComplete.classList.remove('hidden');
          return;
        }

        // 进度提示器：仅更新数字（当前/总数），不显示单词
        currentIndexEl.textContent = currentIndex + 1;
        totalCountEl.textContent = wordList.length;
        speakCurrentWordTwice();
      }

      /**
       * 在完成页以有序列表形式渲染本次听写的全部单词，方便与手写听写本核对
       */
      function renderWordList() {
        wordListEl.innerHTML = '';
        wordList.forEach(function (w, i) {
          var li = document.createElement('li');
          li.className = 'py-2 px-3 border-b border-slate-100 last:border-0 flex justify-between items-center';
          li.innerHTML = '<span class="text-slate-500 w-8">' + (i + 1) + '.</span><span class="flex-1 font-medium text-slate-800">' + escapeHtml(w) + '</span>';
          wordListEl.appendChild(li);
        });
      }

      /** 将字符串转义为安全 HTML，防止 XSS */
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      /**
       * 创建语音识别实例。Chrome/Edge 使用 webkitSpeechRecognition，部分浏览器不支持则返回 null，需依赖“下一个”按钮
       */
      function initRecognition() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          console.warn('当前浏览器不支持语音识别，请使用“下一个”按钮');
          return null;
        }
        var rec = new SpeechRecognition();
        rec.continuous = true;
        rec.interimResults = false;
        rec.lang = 'en-US';

        rec.onresult = function (event) {
          var last = event.results.length - 1;
          var transcript = (event.results[last][0].transcript || '').trim().toLowerCase();
          if (transcript === 'ok' || transcript === 'okay') {
            goNext();
          }
        };

        rec.onerror = function (event) {
          if (event.error === 'no-speech' || event.error === 'aborted') return;
          listeningIndicator.classList.add('hidden');
        };

        rec.onend = function () {
          listeningIndicator.classList.add('hidden');
          // 部分浏览器会短暂结束识别，若仍在听写中且未在朗读，可自动重新开启监听
          if (currentIndex < wordList.length && !isSpeaking && !sectionDictation.classList.contains('hidden')) {
            setTimeout(startListening, 300);
          }
        };

        return rec;
      }

      // ====================  事件绑定（用户操作入口） ====================

      /** 开始听写：解析单词、去重、切换到听写区并开始朗读第一个词 */
      btnStart.addEventListener('click', function () {
        var text = inputWords.value || '';
        wordList = parseWords(text);
        if (wordList.length === 0) {
          alert('请先输入至少一个单词后再开始听写。');
          return;
        }

        currentIndex = 0;
        sectionImport.classList.add('hidden');
        sectionDictation.classList.remove('hidden');
        // 进度提示器：进入听写时初始化显示“1 / 总数”（仅数字，不显示单词）
        totalCountEl.textContent = wordList.length;
        currentIndexEl.textContent = 1;
        currentWordEl.textContent = '请听题';

        if (!recognition) recognition = initRecognition();
        speakCurrentWordTwice();
      });

      /** 重听一遍：停止识别与朗读，再朗读当前单词两遍 */
      btnReplay.addEventListener('click', function () {
        stopListening();
        synth.cancel();
        isSpeaking = false;
        speakCurrentWordTwice();
      });

      /** 手动进入下一个（防卡死：语音识别不可用或未识别到 ok 时使用） */
      btnNext.addEventListener('click', function () {
        goNext();
      });

      /** 重新开始：回到首页、清空列表与输入框 */
      btnRestart.addEventListener('click', function () {
        sectionComplete.classList.add('hidden');
        sectionImport.classList.remove('hidden');
        inputWords.value = '';
        wordList = [];
        currentIndex = 0;
      });

    })();
  </script>
</body>
</html>
